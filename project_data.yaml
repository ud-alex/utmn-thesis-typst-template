# Настройки нумерации распространяются только на формулы
# Нумерация для рисунков и таблиц настраивается по необходимости вручную
# по аналогии с нумерацией формул

# Доступные опции для настройки нумерации:
#   numbering_style: "continuous" — сквозная нумерация формул,
#     не зависящая от глав: (1), (2), ..., (n-1), (n).
#   numbering_style: "nested" — нумерация отдельно в каждой главе:
#     (1.1), (1.2), ..., (2.1), (2.2), ...

numbering_style: "nested"

# Если выбрано numbering_by_default: false, то нумерация будет
# добавляться только к уравнениям, у которых есть метка (label)
# для ссылки на них в тексте.
# Если выбрано numbering_by_default: true, то по умолчанию нумеруются
# все центрированные уравнения, а для отключения нумерации в отдельных
# случаях нужно использовать #math.equation(numbering: false, block: true)[$a^2+b^2=c^2$]

numbering_by_default: false